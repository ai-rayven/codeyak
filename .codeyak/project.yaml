# Generated Code Review Guidelines
# Auto-generated by CodeYak from git history analysis
# Review and customize before using

guidelines:
  - label: explicit-config-provenance
    description: |
      Do not silently fall back to local configuration when operating against remote repositories or in CI; explicitly prefer and validate repository-sourced configs and fail fast if provenance is unclear.
    # Confidence: high
    # Reasoning: Local fallbacks caused CI and production to load developer-local .codeyak files, applying incorrect rules; making source origin explicit prevents accidental use of developer defaults.

  - label: modular-cli-commands
    description: |
      Organize CLI commands into separate, small modules (one command per file) and expose them through a central package entrypoint to keep command logic testable and maintainable.
    # Confidence: high
    # Reasoning: A monolithic CLI file caused coupling and made commands hard to maintain; modularizing simplifies testing and extension.

  - label: concise-targeted-prompts
    description: |
      Author LLM prompts with a clear target audience and concise, prioritized instructions; iterate with sample outputs to validate tone and format instead of embedding many constraints into a single prompt.
    # Confidence: high
    # Reasoning: An overly verbose guideline-generation prompt produced unhelpful output; focused prompts aligned model output with intended users and style.

  - label: modular-context-builders
    description: |
      Split context-building into modular components that accept explicit dependencies (LLM client, repo path) and select only the relevant snippets to include in prompts to keep context focused and testable.
    # Confidence: high
    # Reasoning: Monolithic context builders reduced reusability and made it hard to provide targeted snippets; modular builders improve flexibility and reduce token usage.

  - label: defense-in-depth-llm-output
    description: |
      Combine precise prompting with post-generation validation (heuristics, schema checks, and internal-consistency detection) to filter or transform LLM outputs before acting on them.
    # Confidence: high
    # Reasoning: Removing heuristic filtering relied solely on prompts and allowed false positives; combining prompt design and post-processing reduces erroneous outputs and contradictions.

  - label: establish-tracing-before-shortcuts
    description: |
      Start tracing/instrumentation and attach propagation attributes before any early-return or short-circuit checks so skipped or fast-path runs are properly attributed and traceable.
    # Confidence: high
    # Reasoning: Early-return before propagation context caused missing user_id in traces for skipped reviews; initializing instrumentation first preserves observability.

  - label: minimize-llm-input-to-relevant-snippets
    description: |
      Send only structured diffs and minimal relevant code snippets to LLMs rather than full files; measure token usage and iterate to find the minimal sufficient context.
    # Confidence: high
    # Reasoning: Sending full file contents increased cost and tokens without commensurate benefit; selective context reduces cost and focuses the model on relevant changes.

  - label: simple-terminal-output
    description: |
      Prefer concise, information-dense terminal output with minimal decorative elements so logs and CI output remain readable and parsable; reserve rich formatting for interactive UIs only.
    # Confidence: high
    # Reasoning: Decorative console panels cluttered logs and reduced readability in non-interactive environments; simple output improves clarity.

  - label: parse-diffs-into-structured-models
    description: |
      Parse unified diffs into structured models (hunks, lines, types, and line numbers) and use those structures for comment placement, rendering, and analysis instead of raw diff strings.
    # Confidence: high
    # Reasoning: Unstructured diff text made line-numbered comment placement and reliable analysis fragile; structured models enable precise operations and formatting.

  - label: verify-inline-targets-and-surface-skips
    description: |
      Before posting an inline comment, verify the file and line exist in the MR diff; if they don't, don't silently fall back—either skip and log the skipped comment with reasons or map to a clear fallback policy.
    # Confidence: high
    # Reasoning: Falling back to general comments degraded feedback relevance and hid missing anchors; explicit skipping and logging surfaces failures and preserves signal quality.

  - label: use-role-separated-llm-messages
    description: |
      Construct LLM conversations with explicit roles and separations: one system message for guidelines, separate user messages for existing comments and per-file diffs, and a clear final user instruction to improve clarity and observability.
    # Confidence: high
    # Reasoning: Mixing system, comments, and diffs into a single message reduced traceability and model clarity; role-separated messages make debugging and tracing easier.

  - label: include-essential-metadata-in-domain-models
    description: |
      Ensure domain models and VCS adapters include essential contextual metadata (project name, MR author, paths) so downstream logic and reports have the information they need without calling back into providers.
    # Confidence: high
    # Reasoning: Omitted MR metadata limited contextual reporting and logic; including metadata in models avoids cross-layer queries and improves clarity.

  - label: single-source-of-truth-guidelines
    description: |
      Consolidate shared or overlapping guideline configuration into a single source-of-truth or reusable modules; reference rather than duplicate rules to avoid drift and maintenance burdens.
    # Confidence: high
    # Reasoning: Guidelines duplicated across files caused inconsistencies and maintenance overhead; centralizing reduces drift.

  - label: lazy-init-and-validate-config
    description: |
      Avoid importing and validating configuration at module import time; use lazy initialization factories or getters and keep type hints and models synchronized to prevent import-time errors.
    # Confidence: high
    # Reasoning: Eager config initialization triggered Pydantic validation errors at import time; lazy init prevents side-effect failures and improves testability.

  - label: preserve-raw-and-filtered-metrics
    description: |
      Track both raw detection counts and post-filter/deduped counts, and use the metric appropriate for high-level decisions (e.g., only declare 'no violations' if raw_count == 0); log both for auditing.
    # Confidence: high
    # Reasoning: Using only filtered counts caused misleading success comments despite original detections; keeping both metrics preserves accurate reporting.

  - label: normalize-and-validate-config-inputs
    description: |
      Normalize external configs (strip trailing slashes from endpoints, canonicalize formats) and validate them early on application startup boundary to prevent subtle runtime errors.
    # Confidence: high
    # Reasoning: Trailing slash in Azure endpoint broke authentication; normalizing and validating at boundaries avoids such mismatches.

  - label: verify-third-party-api-usage-with-tests
    description: |
      Confirm third-party library usage against current documentation and add small integration/unit tests that exercise initialization paths to detect API mismatches early.
    # Confidence: high
    # Reasoning: Using the wrong initializer caused the Azure client to be misconfigured; tests and doc verification catch such regressions.

  - label: explicit-constructor-config-and-tests
    description: |
      Design constructors to accept explicit configuration/dependencies (avoid hidden globals) and add unit tests that instantiate components with realistic configs to detect signature drift.
    # Confidence: high
    # Reasoning: Adapter constructor mismatches and reliance on globals caused configuration errors; explicit injection keeps interfaces clear and testable.

  - label: sync-cli-help-and-add-smoke-tests
    description: |
      Keep CLI help/usage strings, package metadata, and module names in sync with code; add smoke tests that import and run CLI entrypoints to catch packaging and naming errors early.
    # Confidence: high
    # Reasoning: Incorrect CLI usage string and missing models caused confusion and runtime failures; smoke tests and synced help text prevent such mistakes.

  - label: use-framework-serialization-apis
    description: |
      When serializing framework-specific models (e.g., Pydantic), use their provided serialization APIs (model_dump_json/json/dict) or convert to plain structures before json.dumps; add tests to validate serialized output.
    # Confidence: high
    # Reasoning: json.dumps on a Pydantic model produced incorrect output; using model APIs ensures correct serialization.

  - label: map-provider-errors-to-domain-exceptions
    description: |
      Translate provider-specific exceptions into domain-level exceptions with clear semantics (e.g., LineNotInDiffError, VCSCommentError) rather than leaking provider error types or string-matching.
    # Confidence: high
    # Reasoning: Leaking provider errors made error handling brittle; domain exceptions give callers stable, actionable error semantics for handling and retries.

  - label: validate-and-parse-ingested-comments
    description: |
      When ingesting external comments, parse and normalize embedded metadata (file, line, guideline id) into structured domain fields so deduplication and matching are accurate.
    # Confidence: high
    # Reasoning: Deduplication missed general comments because adapters didn't extract structured metadata; parsing comments makes matching reliable.

  - label: validate-packaging-and-package-structure
    description: |
      Ensure package layout and build config use valid Python package names and include necessary package markers (e.g., __init__.py) and validate packaging by running local builds or import smoke tests in CI.
    # Confidence: high
    # Reasoning: Invalid package names and missing __init__.py prevented imports and packaging; validating packaging catches such issues early.
